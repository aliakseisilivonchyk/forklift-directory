services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=forklift-directory'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=aliaksei'
    ports:
      - '5432:5432'
  pgadmin:
    image: 'dpage/pgadmin4:latest'
    environment:
      - 'PGADMIN_DEFAULT_EMAIL=aliaksei@test.com'
      - 'PGADMIN_DEFAULT_PASSWORD=secret'
    ports:
      - '80:80'
  app:
    build: ../.
    ports:
      - '8080:8080'
    environment:
      - 'DATABASE_URL=jdbc:postgresql://postgres:5432/forklift-directory'
      - 'DATABASE_USERNAME=aliaksei'
      - 'DATABASE_PASSWORD=secret'
